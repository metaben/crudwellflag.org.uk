# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["blog"]

rssFullContent = true
favicon        = "img/favicon/android-chrome-192x192.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "default"

[footer]
    since      = 2026
    customText = "Contact us at <a href='mailto:crudwellflag@gmail.com'>crudwellflag@gmail.com</a> ✳️ This website does not use cookies and does not collect personal data."

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = ""
    subtitle = "A volunteer group that provides a focus and voice for community issues, shares knowledge about flood prevention, and works to ensure waterways are kept clear."
    avatar   = "img/crudwell_flag_logo.png"

[article]
    headingAnchor = false
    math          = false
    readingTime   = false

    [article.license]
        enabled = true
        default = "<a href='https://creativecommons.org/licenses/by-nc/4.0/'>Licensed under CC BY-NC 4.0</a>"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } }
    ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled  = false
    provider = "disqus"

    # See all the available configurations at https://github.com/CaiJimmy/hugo-theme-stack/blob/master/config/_default/params.toml
    # Copy the configurations you need from there and paste it here.
